 env:
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: A股短线决策工具_APK
          path: programs/stock_tool/bin/*.apk
          if-no-files-found: warn

      - name: 📤 上传 APK（从根目录再找一次）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: APK文件
          path: |
            **/bin/*.apk
            **/*.apk
          if-no-files-found: warn
