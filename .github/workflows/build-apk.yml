# build-apk.yml
# 放到 .github/workflows/ 目录下，推送到 GitHub
# Actions 页面 -> 选择此 workflow -> Run workflow -> 下载 APK

name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-dev python3-pip python3-venv \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libssl-dev \
            libffi-dev libsqlite3-dev libltdl-dev \
            ccache unzip wget curl \
            openjdk-17-jdk openjdk-17-jre
          sudo apt-get clean

      - name: Setup Java
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Build APK
        run: |
          cd programs/stock_tool
          buildozer android debug
        env:
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: programs/stock_tool/bin/*.apk
          if-no-files-found: warn
